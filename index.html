<style>

/* GLOBAL */

body{
margin:0;
font-family:'Source Sans Pro',sans-serif;
background:#0f172a;
color:#e2e8f0;
}

/* NAV */

nav{
background:#020617;
border-bottom:1px solid #1e293b;
}

/* TERMINAL */

.terminal{
background:#020617;
color:#38bdf8;
font-family:monospace;
padding:20px;
border-radius:10px;
margin:30px auto;
width:85%;
max-width:900px;
box-shadow:0 0 20px rgba(56,189,248,0.2);
}

#terminal-text::after{
content:"_";
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

/* PROFILE */

.avatar{
margin-top:30px;
}

#avatar{
width:160px;
border-radius:50%;
}

/* TEXT */

.name{
margin-top:15px;
font-size:28px;
font-weight:600;
color:#38bdf8;
}

/* FADE TEXT */

.fade-text{
opacity:0;
transition:0.5s;
margin-top:10px;
}

/* THREAT FEED */

.threat-feed{
background:#020617;
margin:40px auto;
padding:20px;
border-radius:10px;
width:85%;
max-width:900px;
height:220px;
overflow:hidden;
box-shadow:0 0 20px rgba(248,113,113,0.2);
}

.threat-title{
color:#f87171;
margin-bottom:10px;
}

.threat-item{
color:#f87171;
font-family:monospace;
margin-bottom:5px;
opacity:0;
animation:fadeIn 0.8s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* SOCIAL */

.social{
text-align:center;
margin-top:20px;
}

.social a{
margin:0 12px;
font-size:30px;
color:#94a3b8;
transition:0.3s;
}

.social a:hover{
color:#38bdf8;
}

/* FOOTER */

footer{
text-align:center;
margin-top:30px;
color:#64748b;
}

</style>

</head>

<body>

<nav>
<div class="container">
<div class="nav-wrapper">

<a href="/" class="brand-logo">Yatish W</a>

<ul class="right hide-on-med-and-down">

</ul>

</div>

<!-- TERMINAL -->

<div id="terminal-text"></div>

<!-- PROFILE -->

<div class="container center-align">

<div class="avatar">
<img src="images/avatar.jpg" class="responsive-img" id="avatar">
</div>

<div class="name">Yatish W</div>

<h5 class="fade-text" id="t1">Cyber Security Engineer — Bristol, UK</h5>
<h5 class="fade-text" id="t2">Detection Engineering • SIEM • Threat Hunting</h5>
<h5 class="fade-text" id="t3">Splunk • ELK • Wazuh • Sysmon • MITRE ATT&CK</h5>

</div>

<!-- THREAT FEED -->

<div class="threat-feed" id="threat-feed">
<div class="threat-title">🚨 Live Threat Feed</div>
</div>

<!-- SOCIAL -->

<div class="social">

<a href="https://github.com/Yatishw"><i class="fab fa-github"></i></a>
<a href="mailto:yatiwaghmare@gmail.com"><i class="fas fa-envelope"></i></a>
<a href="https://linkedin.com/in/yatish28"><i class="fab fa-linkedin"></i></a>

</div>

<footer>
<p>Simulated SOC Interface • Built by Yatish W</p>
</footer>

<!-- SCRIPTS -->

<script src="js/jquery-3.3.1.min.js"></script>
<script src="js/materialize.min.js"></script>

<script>

/* TERMINAL EFFECT */

const lines = [
"> Initializing EDR...",
"> Loading detection rules...",
"> Monitoring endpoint telemetry...",
"> Behaviour analytics enabled...",
"> SOC Analyst: Yatish W ✔"
];

let i = 0;
let j = 0;

function typeEffect(){
if(i < lines.length){
if(j < lines[i].length){
document.getElementById("terminal-text").innerHTML += lines[i].charAt(j);
j++;
setTimeout(typeEffect, 25);
}else{
document.getElementById("terminal-text").innerHTML += "<br>";
i++;
j = 0;
setTimeout(typeEffect, 300);
}
}
}

typeEffect();


/* FADE TEXT */

setTimeout(()=>document.getElementById("t1").style.opacity=1,2000);
setTimeout(()=>document.getElementById("t2").style.opacity=1,2600);
setTimeout(()=>document.getElementById("t3").style.opacity=1,3200);


/* THREAT FEED */

const threats = [
"[HIGH] Encoded PowerShell detected",
"[MEDIUM] Suspicious process chain",
"[CRITICAL] Multi-stage attack detected",
"[LOW] Unusual outbound traffic",
"[CRITICAL] Host isolated successfully"
];

function addThreat(){
const feed = document.getElementById("threat-feed");

const item = document.createElement("div");
item.className = "threat-item";
item.innerText = threats[Math.floor(Math.random()*threats.length)];

feed.appendChild(item);

if(feed.children.length > 7){
feed.removeChild(feed.children[1]);
}
}

setInterval(addThreat, 1800);

</script>
