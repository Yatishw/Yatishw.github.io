<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
  background: radial-gradient(circle at top, #0f172a, #020617 80%);

/* HERO */  
.hero{
  height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  position: relative;
  z-index: 1;
  overflow: hidden;
}

/* CONTENT */
.hero-content{
max-width:800px;
padding:20px;
position: relative;
z-index: 2;  
}

/* AVATAR */
.avatar-wrapper {
  position: relative;
  margin-bottom: 30px;
  display: inline-block;
}

.avatar {
  width: 160px;
  height: 160px;
  border-radius: 50%;

  
  transform: scale(1.15);
  object-fit: cover;
  object-position: 50% 25%; /* 🔥 THIS FIXES YOUR ISSUE */
}



/* TEXT */
h1{
font-size:52px;

}

h2{
font-size:26px;
color:#64b5f6;
margin-top:12px;
min-height:30px;
}

p{
margin-top:20px;
font-size:18px;
color:#cfd8dc;
line-height:1.6;
}

/* BUTTONS */
.buttons{
margin-top:30px;
}

.buttons a{
display:inline-block;
padding:12px 24px;
margin:10px;
border-radius:6px;
background:#2196f3;
color:white;
text-decoration:none;
transition:0.3s;
}

.buttons a:hover{
transform:translateY(-3px);
background:#1976d2;
}

.secondary{
background:transparent;
border:1px solid #aaa;
}

.secondary:hover{
background:white;
color:black;
}

/* SOCIAL */
.social{
margin-top:25px;
}

.social a{
font-size:28px;
margin:0 10px;
color:white;
transition:0.3s;
}

.social a:hover{
color:#64b5f6;
}

.highlight{
color:#64b5f6;
font-weight:600;
}

/* FADE */
@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}




#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none; /* 🔥 important */
}


/* ===== CYBER GRID BACKGROUND ===== */
.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,0.9) 0%,
    rgba(0,0,0,0.6) 40%,
    rgba(0,0,0,0.2) 70%,
    transparent 100%
  );


  background:
    repeating-linear-gradient(
      to right,
      rgba(66,165,245,0.25) 0px,
      rgba(66,165,245,0.25) 1px,
      transparent 1px,
      transparent 80px
    ),
    repeating-linear-gradient(
      to bottom,
      rgba(66,165,245,0.08) 0px,   /* 👈 lighter */
      rgba(66,165,245,0.08) 1px,
      transparent 1px,
      transparent 80px
    );

  z-index: 0;
  animation: scan 8s linear infinite;
}

/* ===== LIGHT SWEEP ===== */
.hero::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 100%;
  top: 0;
  left: -50%;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );

  animation: sweep 6s infinite;
}

/* ANIMATIONS */
@keyframes scan {
  0% { background-position: 0 0; }
  100% { background-position: 0 80px; }
}

@keyframes sweep {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

  




  
</style>

<script>
const roles = [
"Detection Engineer",
"Threat Hunter",
"EDR Analyst"
];

let i = 0;
let j = 0;
let current = "";
let deleting = false;

function type(){
let el = document.getElementById("typing");

if(!deleting && j < roles[i].length){
  current += roles[i].charAt(j);
  j++;
}
else if(deleting && j > 0){
  current = current.slice(0, -1);
  j--;
}

el.innerHTML = current;

/* pause at full word */
if(j === roles[i].length){
  deleting = true;
  setTimeout(type, 1200);
  return;
}

/* move to next word */
if(j === 0 && deleting){
  deleting = false;
  i = (i + 1) % roles.length;
}

setTimeout(type, deleting ? 40 : 80);
}

type();
</script>

 
  
</body>
