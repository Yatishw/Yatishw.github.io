<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Yatish W | SOC Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/materialize.min.css">
<link rel="stylesheet" href="css/all.css">

<link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600" rel="stylesheet">

<style>

/* BASE */

body{
margin:0;
font-family:'Source Sans Pro',sans-serif;
background:#020617;
color:#e2e8f0;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
background-size:50px 50px;
z-index:-1;
}

/* NAV */

nav{
background:#020617;
border-bottom:1px solid #1e293b;
}

/* TERMINAL */

.terminal{
background:#020617;
padding:20px;
margin:20px auto;
width:90%;
max-width:1000px;
border-radius:10px;
color:#38bdf8;
font-family:monospace;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
width:90%;
margin:auto;
}

/* CARD */

.card{
background:#020617;
border:1px solid #1e293b;
border-radius:10px;
padding:20px;
}

/* THREATS */

.threat-item{
padding:6px;
font-family:monospace;
cursor:pointer;
}

.high{color:#f87171;}
.medium{color:#facc15;}
.low{color:#4ade80;}

.threat-item:hover{
background:rgba(255,255,255,0.05);
}

/* PANEL */

.panel{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#020617;
border-left:1px solid #1e293b;
padding:20px;
transition:0.4s;
}

.panel.active{
right:0;
}

/* BUTTON */

.btn-sim{
margin-top:15px;
background:#38bdf8;
color:black;
padding:8px 15px;
border:none;
cursor:pointer;
border-radius:6px;
}

/* CHART */

canvas{
width:100%;
height:200px;
}

/* SOCIAL */

.social{
text-align:center;
margin:30px 0;
}

.social a{
margin:0 10px;
font-size:26px;
color:#94a3b8;
}

.social a:hover{
color:#38bdf8;
}

</style>
</head>

<body>

<nav>
<div class="container">
<div class="nav-wrapper">
<a class="brand-logo">Yatish W</a>
<ul class="right">
<li><a href="projects.html">Projects</a></li>
<li><a href="docs/Resume_Yatish1.pdf">Resume</a></li>
</ul>
</div>
</div>
</nav>

<!-- TERMINAL -->

<div class="terminal" id="terminal"></div>

<!-- DASHBOARD -->

<div class="dashboard">

<!-- LEFT -->

<div class="card">

<h5>🚨 Threat Feed</h5>
<div id="feed"></div>

<button class="btn-sim" onclick="simulateAttack()">Run Attack Simulation</button>

<h5 style="margin-top:20px;">📊 Detection Trend</h5>
<canvas id="chart"></canvas>

</div>

<!-- RIGHT -->

<div class="card">
<h6>Alerts</h6>
<h4 id="count">0</h4>

<h6>Status</h6>
<p style="color:#4ade80;">● Active Monitoring</p>

<h6>Endpoint</h6>
<p>Windows (Wazuh + Sysmon)</p>
</div>

</div>

<!-- PANEL -->

<div class="panel" id="panel">
<h5>🔍 Investigation</h5>
<p id="panel-text"></p>
</div>

<!-- SOCIAL -->

<div class="social">
<a href="https://github.com/Yatishw"><i class="fab fa-github"></i></a>
<a href="https://linkedin.com/in/yatish28"><i class="fab fa-linkedin"></i></a>
</div>

<script>

/* TERMINAL */

const termLines = [
"> Initializing EDR...",
"> Loading rules...",
"> Monitoring telemetry...",
"> Detection active ✔"
];

let t = document.getElementById("terminal");
let ti=0;

function termType(){
if(ti<termLines.length){
t.innerHTML+=termLines[ti]+"<br>";
ti++;
setTimeout(termType,400);
}
}
termType();

/* THREATS */

let count=0;

const threatTypes=[
{msg:"Encoded PowerShell",cls:"high"},
{msg:"Process Injection",cls:"high"},
{msg:"Suspicious Network",cls:"medium"},
{msg:"Recon Activity",cls:"low"}
];

function addThreat(){
let feed=document.getElementById("feed");

let t=threatTypes[Math.floor(Math.random()*threatTypes.length)];

let div=document.createElement("div");
div.className="threat-item "+t.cls;
div.innerText="["+t.cls.toUpperCase()+"] "+t.msg;

div.onclick=()=>openPanel(t.msg);

feed.appendChild(div);

count++;
document.getElementById("count").innerText=count;

if(feed.children.length>8){
feed.removeChild(feed.children[0]);
}
}

/* SIMULATION */

function simulateAttack(){
for(let i=0;i<5;i++){
setTimeout(addThreat,i*500);
}
}

/* PANEL */

function openPanel(text){
document.getElementById("panel").classList.add("active");
document.getElementById("panel-text").innerHTML=
"Alert: "+text+
"<br><br>Stage 1: Detection<br>Stage 2: Correlation<br>Stage 3: Containment";
}

/* CHART */

let canvas=document.getElementById("chart");
let ctx=canvas.getContext("2d");

let data=[5,10,6,14,9,18];

function drawChart(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<data.length;i++){
ctx.fillStyle="#38bdf8";
ctx.fillRect(i*40,200-data[i]*5,20,data[i]*5);
}
}

drawChart();

</script>

</body>
</html>
